# AgentBear Crypto Agent Configuration
# Auto-generated by setup wizard

# Agent Identity
agent:
  name: Sentinel
  type: crypto
  version: "1.0.0"

# User Config
user:
  name: Derek
  language: en

# Model Configuration (supports: claude, gpt4o, gemini, kimi)
models:
  primary: claude
  fallback: gpt4o
  
model_keys:
  claude_api_key: ${ANTHROPIC_API_KEY}
  openai_api_key: ${OPENAI_API_KEY}
  google_api_key: ${GOOGLE_API_KEY}
  kimi_api_key: ${KIMI_API_KEY}

# Exchange Configuration
exchanges:
  cex:
    binance:
      enabled: true
      api_key: ${BINANCE_API_KEY}
      api_secret: ${BINANCE_API_SECRET}
    kraken:
      enabled: false
      api_key: ${KRAKEN_API_KEY}
      api_secret: ${KRAKEN_API_SECRET}
  
  dex:
    ethereum:
      uniswap_v3:
        enabled: false
        rpc_url: https://eth.rpc.blxrbdn.com
      one_inch:
        enabled: false
        rpc_url: https://eth.rpc.blxrbdn.com
    
    solana:
      raydium:
        enabled: true
        rpc_url: https://api.mainnet-beta.solana.com
      jupiter:
        enabled: true
        rpc_url: https://api.mainnet-beta.solana.com

# Telegram Bot Configuration
messaging:
  type: telegram
  bot_token: ${TELEGRAM_BOT_TOKEN}

# Memory Configuration
memory:
  database: agentbear_memory.db
  retention:
    conversations: 30  # days
    patterns: 7        # days
    preferences: forever
    snapshots: 1       # day
