# Bond Agent Configuration
# This file is auto-generated by setup wizard or manually edited

language: en
user_name: Derek
agent_name: Sentinel

# Model Configuration
model: claude
model_api_key: ${ANTHROPIC_API_KEY}  # Set via setup wizard

# Exchange Configuration
exchanges:
  binance:
    enabled: false
    api_key: ${BINANCE_API_KEY}
    api_secret: ${BINANCE_API_SECRET}
  
  raydium:
    enabled: true
    rpc_url: https://api.mainnet-beta.solana.com

# Telegram Configuration
telegram:
  enabled: false
  bot_token: ${TELEGRAM_BOT_TOKEN}

# Monitoring Configuration
monitoring:
  enabled: false
  update_interval: 300  # 5 minutes
  tokens: []

# Memory Configuration
memory:
  database: bond_agent.db
  cleanup_days: 30
